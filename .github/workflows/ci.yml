name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  PNPM_VERSION: 10.0.0
  NODE_VERSION: 20

jobs:
  # ── Typecheck + lint (no database needed) ─────────────────────────────
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      # Generate the Prisma client + build shared so downstream typechecks resolve.
      - run: pnpm --filter @blubranch/db exec prisma generate
      - run: pnpm --filter @blubranch/shared build
      - name: Typecheck
        run: |
          pnpm --filter @blubranch/shared typecheck
          pnpm --filter @blubranch/db typecheck
          pnpm --filter @blubranch/api typecheck
          pnpm --filter @blubranch/mobile typecheck
      - name: Lint
        run: pnpm --filter @blubranch/api lint

  # ── API integration test suite (real Postgres + Redis) ────────────────
  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgis/postgis:16-3.4
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: blubranch
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      NODE_ENV: test
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/blubranch?schema=public
      REDIS_URL: redis://localhost:6379
      JWT_SECRET: ci-test-secret-not-for-production-0123456789
      APPLE_CLIENT_IDS: com.blubranch.app
      GOOGLE_CLIENT_IDS: ci-web.apps.googleusercontent.com
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter @blubranch/db exec prisma generate
      - run: pnpm --filter @blubranch/shared build
      - name: Push schema to test database
        run: pnpm --filter @blubranch/db exec prisma db push --skip-generate
      - name: Seed reference data (trades, skills, benefits)
        run: pnpm --filter @blubranch/db exec prisma db seed
      - name: Run API test suite (includes E2E critical flow)
        run: pnpm --filter @blubranch/api test

  # ── Real Stripe test-mode E2E (only when the secret is configured) ────
  # Skips automatically on forks / when STRIPE_SECRET_KEY isn't set, so CI stays
  # green without leaking the ability to run it. Add STRIPE_SECRET_KEY (+ the
  # publishable key and unlimited price id) as repo secrets to enable.
  stripe-e2e:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgis/postgis:16-3.4
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: blubranch
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
      redis:
        image: redis:7
        ports:
          - 6379:6379
    env:
      NODE_ENV: test
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/blubranch?schema=public
      REDIS_URL: redis://localhost:6379
      JWT_SECRET: ci-test-secret-not-for-production-0123456789
      STRIPE_SECRET_KEY: ${{ secrets.STRIPE_SECRET_KEY }}
      STRIPE_PUBLISHABLE_KEY: ${{ secrets.STRIPE_PUBLISHABLE_KEY }}
      STRIPE_PRICE_UNLIMITED: ${{ secrets.STRIPE_PRICE_UNLIMITED }}
    steps:
      - uses: actions/checkout@v4
      - name: Check for Stripe secret
        id: guard
        run: |
          if [ -n "$STRIPE_SECRET_KEY" ]; then
            echo "enabled=true" >> "$GITHUB_OUTPUT"
          else
            echo "enabled=false" >> "$GITHUB_OUTPUT"
            echo "STRIPE_SECRET_KEY not set — skipping live Stripe E2E."
          fi
      - if: steps.guard.outputs.enabled == 'true'
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}
      - if: steps.guard.outputs.enabled == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
      - if: steps.guard.outputs.enabled == 'true'
        run: pnpm install --frozen-lockfile
      - if: steps.guard.outputs.enabled == 'true'
        run: pnpm --filter @blubranch/db exec prisma generate
      - if: steps.guard.outputs.enabled == 'true'
        run: pnpm --filter @blubranch/shared build
      - if: steps.guard.outputs.enabled == 'true'
        run: pnpm --filter @blubranch/db exec prisma db push --skip-generate
      - if: steps.guard.outputs.enabled == 'true'
        run: pnpm --filter @blubranch/db exec prisma db seed
      - name: Run Stripe test-mode E2E (4242 card)
        if: steps.guard.outputs.enabled == 'true'
        run: pnpm --filter @blubranch/api exec tsx scripts/stripe-e2e.ts
