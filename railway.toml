# Railway service config for the BluBranch API.
#
# Build is owned by `Dockerfile` next to this file (we switched away from
# Nixpacks because its Node provider always inserts an unconditional
# `RUN npm i` in stage-0 that can't parse pnpm's `workspace:*` protocol —
# see docs/RAILWAY-LESSONS.md issue 10).
#
# This file only carries deploy-time settings (healthcheck, restart
# policy, watch paths).
#
# Required Railway service settings (set in the dashboard, not here):
#   - Root Directory: leave blank.
#   - Config-as-Code Path: leave default (Railway auto-detects this file).
#   - Builder: should pick up DOCKERFILE automatically because we have a
#     Dockerfile at the repo root. The builder field below makes it
#     explicit so a Nixpacks default can't sneak back in.

[build]
builder = "DOCKERFILE"
dockerfilePath = "Dockerfile"
# NOTE: watchPatterns temporarily removed (2026-06-08) — Railway's
# change-detection on `railway up` was incorrectly skipping the Phase 4
# build ("no changes detected in watch paths") even though packages/api,
# packages/db, packages/shared and pnpm-lock.yaml all changed. With no
# watchPatterns, every deploy rebuilds (safe). Restore the scoped list
# below once the auto-deploy path is confirmed working:
#   watchPatterns = ["packages/api/**","packages/shared/**","packages/db/**",
#     "pnpm-lock.yaml","pnpm-workspace.yaml","package.json","Dockerfile",
#     ".dockerignore","railway.toml"]

[deploy]
healthcheckPath = "/health"
healthcheckTimeout = 300
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 10
