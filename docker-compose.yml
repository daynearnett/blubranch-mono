services:
  postgres:
    image: postgis/postgis:16-3.4
    container_name: blubranch-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: blubranch
      POSTGRES_PASSWORD: blubranch
      POSTGRES_DB: blubranch
    ports:
      - "5432:5432"
    volumes:
      - blubranch_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U blubranch -d blubranch"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: blubranch-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - blubranch_redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  blubranch_pg_data:
  blubranch_redis_data:
