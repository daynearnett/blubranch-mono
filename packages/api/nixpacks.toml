# Pin Node + pnpm via Nixpacks so a future Railway base-image rotation
# can't silently change them under us. Both versions match what we use
# locally and in `.npmrc`.

[phases.setup]
nixPkgs = ["nodejs_20", "openssl", "ca-certificates"]

[variables]
# Telling pnpm where to put its global store inside the build sandbox
# avoids "EACCES" failures when pnpm tries to write to /root.
PNPM_HOME = "/root/.local/share/pnpm"
