# Railway service config for the BluBranch API.
#
# Build, install, and start are owned by `nixpacks.toml` next to this file.
# This file only carries deploy-time settings (healthcheck, restart policy,
# watch paths).
#
# Required Railway service settings (set in the dashboard, not here):
#   - Root Directory: leave blank (build context = monorepo root, so /app
#     contains pnpm-workspace.yaml and the install/start cmds in
#     nixpacks.toml resolve correctly).
#   - Config Path: `packages/api/railway.toml` so Railway reads this file
#     and the sibling `nixpacks.toml`.

[build]
builder = "NIXPACKS"
# Trigger a rebuild only when files in api / db / shared change. Other
# workspaces (mobile, admin) shouldn't redeploy the API.
watchPatterns = [
  "packages/api/**",
  "packages/shared/**",
  "packages/db/**",
  "pnpm-lock.yaml",
  "package.json",
]

[deploy]
healthcheckPath = "/health"
healthcheckTimeout = 300
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 10
